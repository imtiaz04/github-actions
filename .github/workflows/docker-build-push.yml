name: Docker Build and Push
on:
    # push:
    #     branches: [main]
    workflow_call:
jobs:
    build-and-push:
        
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                    username: ${{ vars.DOCKERHUB_USER1 }}
                    password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push DockerHub
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: |
                    ${{ vars.DOCKERHUB_USER1 }}/github-actions-app:latest
                    ${{ vars.DOCKERHUB_USER1 }}/github-actions-app:${{ github.sha }}
                    ${{ vars.DOCKERHUB_USER1 }}/github-actions-app:${{ github.ref_name }}

                    