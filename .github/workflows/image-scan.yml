# uses Trivy image scanner for common vulnerabilities 
name: Image Scanner

on: 
    workflow_call:

jobs:
    image-scanner:
        runs-on: ubuntu-latest
        steps:
            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                    username: ${{ vars.DOCKERHUB_USER1 }}
                    password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Trivy image scan              
              uses: aquasecurity/trivy-action@0.35.0
              with:
                image-ref: imtiaz42/github-actions-app:latest
                format: table
                exit-code: '1'
                ignore-unfixed: true
                vuln-type: 'os,library'
                severity: 'HIGH,CRITICAL'
                scanners: 'vuln'
